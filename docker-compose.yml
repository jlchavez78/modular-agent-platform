# docker-compose.yml
version: '3.8'

services:
  # --- (Message Broker) ---
  kafka:
    image: bitnami/kafka:3.6
    container_name: aiops-kafka
    ports:
      - "9092:9092"
    environment:
      # Modo KRaft (Sin Zookeeper) para ahorrar recursos
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@localhost:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      # Permitimos que cree los topics (ej: intentions.received) automáticamente al vuelo
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
    volumes:
      - kafka_data:/bitnami/kafka

  # --- MEMORIA A CORTO PLAZO (Estados y Semáforos de LangGraph) ---
  redis:
    image: redis:7-alpine
    container_name: aiops-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # --- MEMORIA A LARGO PLAZO (Trazabilidad y FinOps para el Dashboard) ---
  postgres:
    image: postgres:16-alpine
    container_name: aiops-postgres
    environment:
      - POSTGRES_USER=aiops_user
      - POSTGRES_PASSWORD=aiops_password
      - POSTGRES_DB=aiops_monitor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  kafka_data:
  redis_data:
  postgres_data: